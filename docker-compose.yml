services:
  backend:
    image: python:3.11-slim
    working_dir: /app/backend
    command: >
      sh -c "pip install -e . &&
             uvicorn app.main:app --host 0.0.0.0 --port 8000"
    environment:
      DATA_DIR: /app/data
      DATABASE_URL: ${DATABASE_URL}
      INFERENCE_BACKEND: mock
      TASK_WORKER_ENABLED: "true"
      CORS_ORIGINS: http://localhost:4004,http://127.0.0.1:4004
    ports:
      - "8010:8000"
    volumes:
      - .:/app

  frontend:
    image: node:24
    working_dir: /app/frontend
    command: >
      sh -c "npm install &&
             npm run dev -- --host 0.0.0.0 --port 4004"
    environment:
      VITE_API_BASE_URL: http://localhost:8010
    ports:
      - "4004:4004"
    volumes:
      - .:/app
    depends_on:
      - backend
